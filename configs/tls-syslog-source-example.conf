# SC4S TLS-enabled syslog source example
# Path convention: env/tls-listener.env (referenced by docker-compose.yml)
#
# Enables a TLS-wrapped syslog listener on a dedicated port, for sources that
# support encrypted transport (most modern firewalls, load balancers, and
# EDR platforms support this — prefer it over plaintext UDP/TCP 514 wherever
# the source supports it).

SC4S_LISTEN_TLS_PORT=6514
SC4S_TLS_CERT_FILE=/etc/pki/sc4s/tls/server-cert.pem
SC4S_TLS_KEY_FILE=/etc/pki/sc4s/tls/server-key.pem
SC4S_TLS_CA_FILE=/etc/pki/sc4s/tls/ca-cert.pem
SC4S_TLS_PEER_VERIFY=optional

# Output routing — send to a dedicated index for firewall/network sources
# rather than a generic catch-all, so retention and access controls can be
# scoped per source type.
SC4S_DEST_SPLUNK_HEC_DEFAULT_INDEX=network_security
SC4S_SOURCE_TLS_PORT_6514_INDEX=network_security
